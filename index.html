<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Scraper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      margin-bottom: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo svg { width: 28px; height: 28px; }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0d0d0d;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      color: #0d0d0d;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #1da1f2; }
    input[type="text"]::placeholder { color: #9ca3af; }

    button {
      padding: 12px 20px;
      background: #1da1f2;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #1a91da; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      margin-top: 20px;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      display: none;
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .status.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid #bfdbfe;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .profile-name { font-weight: 700; font-size: 16px; color: #0d0d0d; }
    .profile-handle { font-size: 13px; color: #1da1f2; margin-bottom: 8px; }
    .profile-bio { font-size: 13px; color: #4b5563; margin-bottom: 10px; line-height: 1.5; }
    .profile-stats { display: flex; gap: 16px; font-size: 13px; color: #6b7280; }
    .profile-stats span strong { color: #0d0d0d; font-weight: 700; }

    .tweets-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tweet-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .tweet-text {
      font-size: 13px;
      color: #0d0d0d;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .tweet-meta {
      display: flex;
      gap: 14px;
      font-size: 12px;
      color: #9ca3af;
    }

    .tweet-meta span { display: flex; align-items: center; gap: 4px; }

    .tweets-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    .success-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #15803d;
      margin-bottom: 12px;
    }

    /* Table section */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .table-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #0d0d0d;
    }

    .refresh-btn {
      padding: 6px 14px;
      font-size: 13px;
      background: #f3f4f6;
      color: #374151;
      border-radius: 8px;
    }

    .refresh-btn:hover { background: #e5e7eb; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      border-bottom: 1.5px solid #e5e7eb;
      white-space: nowrap;
    }

    td {
      padding: 12px 12px;
      border-bottom: 1px solid #f3f4f6;
      color: #374151;
      vertical-align: top;
      max-width: 260px;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    .handle { color: #1da1f2; font-weight: 600; }
    .num { font-weight: 600; color: #0d0d0d; }
    .bio-cell { color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

    .empty {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 14px;
    }

    .table-loading {
      text-align: center;
      padding: 32px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="#1da1f2"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        <h1>Profile Scraper</h1>
      </div>

      <label for="username">Twitter / X Username</label>
      <div class="input-row">
        <input
          id="username"
          type="text"
          placeholder="@elonmusk"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button id="btn" onclick="runScrape()">Scrape</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <div class="table-header">
        <h2>Scraped Profiles</h2>
        <button class="refresh-btn" onclick="loadTable()">Refresh</button>
      </div>
      <div class="table-wrap">
        <div id="table-container" class="table-loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://simple-scraper-6qtn.onrender.com";

    const input  = document.getElementById("username");
    const btn    = document.getElementById("btn");
    const status = document.getElementById("status");

    input.addEventListener("keydown", e => { if (e.key === "Enter") runScrape(); });

    function fmt(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
      if (n >= 1_000)     return (n / 1_000).toFixed(1) + "K";
      return String(n);
    }

    async function runScrape() {
      const username = input.value.trim().replace(/^@/, "");
      if (!username) { input.focus(); return; }

      btn.disabled = true;
      status.className = "status loading";
      status.innerHTML = `<div class="spinner"></div> Scraping @${username} — this may take a few seconds…`;

      try {
        const res = await fetch(`${API_URL}/scrape`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          status.className = "status error";
          status.textContent = data.error || "Something went wrong.";
        } else {
          const p = data.profile;
          status.className = "status success";
          const tweetsHtml = p.recent_tweets && p.recent_tweets.length ? `
            <div class="tweets-title">Recent Tweets</div>
            <div class="tweets-list">
              ${p.recent_tweets.map(t => `
                <div class="tweet-item">
                  <div class="tweet-text">${t.text}</div>
                  <div class="tweet-meta">
                    <span>♥ ${fmt(t.likes)}</span>
                    <span>↺ ${fmt(t.retweets)}</span>
                    <span>💬 ${fmt(t.replies)}</span>
                  </div>
                </div>
              `).join("")}
            </div>
          ` : "";

          status.innerHTML = `
            <div class="success-tag">✓ Saved to Airtable</div>
            <div class="profile-name">${p.display_name}</div>
            <div class="profile-handle">@${p.username}</div>
            ${p.bio ? `<div class="profile-bio">${p.bio}</div>` : ""}
            <div class="profile-stats">
              <span><strong>${fmt(p.followers)}</strong> Followers</span>
              <span><strong>${fmt(p.following)}</strong> Following</span>
            </div>
            ${tweetsHtml}
          `;
          input.value = "";
          loadTable();
        }
      } catch (err) {
        status.className = "status error";
        status.textContent = "Could not reach the API. Is the server running?";
      }

      btn.disabled = false;
    }

    async function loadTable() {
      const container = document.getElementById("table-container");
      container.innerHTML = '<div class="table-loading">Loading...</div>';

      try {
        const res = await fetch(`${API_URL}/records`);
        const rows = await res.json();

        if (!Array.isArray(rows) || rows.length === 0) {
          container.innerHTML = '<div class="empty">No profiles scraped yet.</div>';
          return;
        }

        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Display Name</th>
                <th>Followers</th>
                <th>Following</th>
                <th>Tweets</th>
                <th>Bio</th>
                <th>Location</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td><span class="handle">@${r["Name"] || ""}</span></td>
                  <td>${r["Display Name"] || ""}</td>
                  <td><span class="num">${fmt(r["Followers"] || 0)}</span></td>
                  <td><span class="num">${fmt(r["Following"] || 0)}</span></td>
                  <td><span class="num">${fmt(r["Tweets Count"] || 0)}</span></td>
                  <td class="bio-cell" title="${(r["Bio"] || "").replace(/"/g, "&quot;")}">${r["Bio"] || ""}</td>
                  <td>${r["Location"] || ""}</td>
                  <td>${r["Joined"] || ""}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      } catch (err) {
        container.innerHTML = '<div class="empty">Could not load records.</div>';
      }
    }

    loadTable();
  </script>
</body>
</html>
