services:
  - type: web
    name: scraper-api
    env: python
    buildCommand: pip install -r requirements.txt && playwright install-deps chromium
    startCommand: playwright install chromium && gunicorn app:app --timeout 120
    envVars:
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE
        sync: false
