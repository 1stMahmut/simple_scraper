services:
  - type: web
    name: scraper-api
    env: python
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 playwright install chromium && PLAYWRIGHT_BROWSERS_PATH=0 playwright install-deps chromium
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE
        sync: false
